name: build-conda-cos7-v2

on:
  push:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "pyproject.toml"
      - "recipe/**"
      - ".github/workflows/build-conda-cos7-v2.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "pyproject.toml"
      - "recipe/**"
      - ".github/workflows/build-conda-cos7-v2.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build conda package in cos7 container (host-visible artifacts)
        run: |
          set -euo pipefail
          echo "workspace=$GITHUB_WORKSPACE"
          rm -rf conda-out
          mkdir -p conda-out

          docker run --rm \
            -v "$GITHUB_WORKSPACE:/work:rw" \
            -w /work \
            --entrypoint /bin/bash \
            condaforge/linux-anvil-cos7-x86_64 \
            -lc '
              set -euo pipefail
              echo "=== inside container ==="
              id || true
              pwd
              ls -la
              ls -la recipe

              # install build tooling (NO conda-verify; conflicts with pinned py312 in image)
              mamba install -y conda-build boa conda-package-handling binutils -c conda-forge

              # write to mounted volume
              conda mambabuild recipe -c conda-forge --output-folder /work/conda-out

              echo "== inside container: produced packages =="
              find /work/conda-out -maxdepth 3 -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | sed -n "1,80p"
            '

          echo "== on host: produced packages =="
          find conda-out -maxdepth 3 -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | sed -n "1,80p"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-out-linux-64
          path: |
            conda-out/linux-64/*.conda
            conda-out/linux-64/*.tar.bz2
