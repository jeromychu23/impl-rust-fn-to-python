name: build-conda-cos7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: condaforge/linux-anvil-cos7-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          mamba install -y conda-build boa conda-verify conda-package-handling binutils -c conda-forge

      - name: Build conda package
        run: |
          conda mambabuild recipe -c conda-forge --output-folder conda-out
          ls -la conda-out/linux-64

      - name: Check GLIBC requirements in produced .so
        run: |
          python - <<'PY'
          import glob, os, shutil
          from conda_package_handling.api import extract
          pkgs = sorted(glob.glob("conda-out/linux-64/*.conda"))
          assert pkgs, "No .conda produced"
          pkg = pkgs[-1]
          out="/tmp/extracted_pkg"
          shutil.rmtree(out, ignore_errors=True)
          os.makedirs(out, exist_ok=True)
          extract(pkg, out)
          print("pkg:", pkg)
          PY
          SO=$(find /tmp/extracted_pkg -name "*.so" | head -n 1)
          echo "SO=$SO"
          objdump -T "$SO" | grep GLIBC_ | sort -u | tail -n 60
          if objdump -T "$SO" | grep -q "GLIBC_2.33\|GLIBC_2.34"; then
            echo "ERROR: still requires GLIBC_2.33/2.34"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-out-linux-64
          path: conda-out/linux-64/*.conda
