name: Build Conda Package

on:
  push:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "pyproject.toml"
      - "recipe/**"
      - ".github/workflows/build-conda.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "pyproject.toml"
      - "recipe/**"
      - ".github/workflows/build-conda.yml"
  workflow_dispatch:

jobs:
  build-conda:
    name: Build conda package on Linux
    runs-on: ubuntu-22.04
    env:
      CONDA_PKGS_DIRS: /home/runner/conda_pkgs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Rust build cache (big win)
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict
          activate-environment: build-env
          conda-solver: classic

      - name: Configure conda network retries/timeouts
        shell: bash -l {0}
        run: |
          conda config --set solver classic
          conda config --set remote_connect_timeout_secs 60
          conda config --set remote_read_timeout_secs 300
          conda config --set remote_max_retries 10
          conda config --set remote_backoff_factor 2
          conda info

      - name: Install build dependencies
        shell: bash -l {0}
        run: |
          conda install -y conda-build pip python=3.11 maturin rust

      - name: Build conda package to fixed output folder
        shell: bash -l {0}
        run: |
          mkdir -p $GITHUB_WORKSPACE/conda-out
          conda build recipe -c conda-forge --output-folder $GITHUB_WORKSPACE/conda-out

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-linux-64
          path: |
            ${{ github.workspace }}/conda-out/linux-64/*.conda
            ${{ github.workspace }}/conda-out/linux-64/*.tar.bz2
            ${{ github.workspace }}/conda-out/noarch/*.conda
            ${{ github.workspace }}/conda-out/noarch/*.tar.bz2
          if-no-files-found: error