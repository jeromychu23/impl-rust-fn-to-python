name: Build Conda Package

on:
  push:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "pyproject.toml"
      - "recipe/**"
      - ".github/workflows/build-conda.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "pyproject.toml"
      - "recipe/**"
      - ".github/workflows/build-conda.yml"
  workflow_dispatch:

jobs:
  build-conda:
    name: Build conda package on Linux
    runs-on: ubuntu-latest
    env:
      CONDA_PKGS_DIRS: /home/runner/conda_pkgs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Rust build cache (big win)
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: false
          python-version: "3.11"
          channels: conda-forge,defaults
          channel-priority: strict
          activate-environment: build-env
          conda-solver: classic

      # Put conda pkgs in a stable place we can cache
      - name: Configure conda cache dir
        shell: bash -l {0}
        run: |
          mkdir -p $HOME/conda_pkgs
          conda config --set solver classic
          conda info

      - name: Cache conda packages
        uses: actions/cache@v4
        with:
          path: /home/runner/conda_pkgs
          key: ${{ runner.os }}-conda-${{ hashFiles('recipe/meta.yaml') }}
          restore-keys: |
            ${{ runner.os }}-conda-

      - name: Install build dependencies
        shell: bash -l {0}
        run: |
          conda install -y conda-build pip python=3.11 maturin rust

      - name: Build conda package to fixed output folder
        shell: bash -l {0}
        run: |
          mkdir -p $GITHUB_WORKSPACE/conda-out
          conda build recipe -c conda-forge --output-folder $GITHUB_WORKSPACE/conda-out

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-linux-64
          path: |
            ${{ github.workspace }}/conda-out/linux-64/*.conda
            ${{ github.workspace }}/conda-out/linux-64/*.tar.bz2
            ${{ github.workspace }}/conda-out/noarch/*.conda
            ${{ github.workspace }}/conda-out/noarch/*.tar.bz2
          if-no-files-found: error