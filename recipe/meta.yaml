{% set name = "hello-rust" %}
{% set version = "0.1.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - {{ compiler('c') }}
    - rust
  host:
    - python 3.11.*
    - pip
    - maturin >=1.0,<2.0
  run:
    - python 3.11.*
    - polars

test:
  imports:
    - hello_rust
  commands:
    - python -c "import hello_rust; assert hello_rust.add(2, 3) == 5"
    - python -c "import hello_rust; assert hasattr(hello_rust, 'pivot_by_prefix')"
    - python -c "import hello_rust; assert hasattr(hello_rust, 'propagate_target_from_ancestor')"
    - python -c "import polars as pl, hello_rust; df=pl.DataFrame({'SERIAL':['A'],'PART':['1'],'PARENTSERIAL':['B-58x'],'PARENTPART':[''],'TRXTYPE':['Install'],'new_date':['2022-01-01T00:00:00.000Z']}); out=hello_rust.propagate_target_from_ancestor(df=df,self_cols=['SERIAL','PART'],parent_cols=['PARENTSERIAL','PARENTPART'],target_col='new_date',target_key={'TRXTYPE':'Install'},para={'PARENTSERIAL':'B-58'},plan='backward',block_key={'TRXTYPE':'Remove'}); assert out.shape==(1,6)"

about:
  summary: "A tiny Rust extension for Python"
  license: MIT